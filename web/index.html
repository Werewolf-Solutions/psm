<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>psm · projects manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="logo">psm</span>
        <span class="tag">projects manager</span>
      </div>
      <div class="search-wrap">
        <input id="search" type="search" placeholder="Search projects, stacks, statuses…" />
      </div>
      <div class="actions">
        <button id="ws-chat-open" class="btn" title="Chat with an AI that has access to every project">💬&nbsp;Ask&nbsp;psm</button>
        <button id="rules-open" class="btn" title="Edit the shared AI house rules">House&nbsp;rules</button>
        <button id="new-open" class="btn" title="Create a new project">＋&nbsp;New</button>
        <button id="export" class="btn" title="Regenerate PROJECTS.md">Export&nbsp;MD</button>
        <button id="rescan" class="btn btn-primary" title="Re-scan the workspace">Rescan</button>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <nav class="filters" id="filters"></nav>

    <main id="board" class="board"></main>

    <footer class="foot">
      <span id="foot-note"></span>
    </footer>

    <!-- edit drawer -->
    <div class="drawer-backdrop" id="backdrop" hidden></div>
    <aside class="drawer" id="drawer" hidden>
      <div class="drawer-head">
        <h2 id="d-name">—</h2>
        <button class="icon-btn" id="d-close" aria-label="Close">✕</button>
      </div>
      <div class="drawer-body">
        <div class="auto-block" id="d-auto"></div>
        <label>Status
          <select id="d-status"></select>
        </label>
        <label>Priority
          <select id="d-priority">
            <option value="">— none —</option>
            <option value="high">high</option>
            <option value="medium">medium</option>
            <option value="low">low</option>
          </select>
        </label>
        <label class="check">
          <input type="checkbox" id="d-pinned" /> Pin to top
        </label>
        <label>Description
          <textarea id="d-description" rows="3" placeholder="Override the auto description…"></textarea>
        </label>
        <label>Next step
          <textarea id="d-next" rows="2" placeholder="What's the next action?"></textarea>
        </label>
        <label>Run command
          <input id="d-run" type="text" placeholder="e.g. npm run dev" />
        </label>
        <label>Web port
          <input id="d-port" type="number" min="1" max="65535" placeholder="e.g. 3000" />
        </label>
        <label>Deploy → staging
          <input id="d-deploy-staging" type="text" placeholder="e.g. npm run deploy:staging" />
        </label>
        <label>Deploy → production
          <input id="d-deploy-production" type="text" placeholder="e.g. npm run deploy" />
        </label>
        <label>AI engine
          <select id="d-engine">
            <option value="">— default (Claude Code) —</option>
            <option value="claude">Claude Code</option>
            <option value="codex">Codex</option>
          </select>
        </label>
        <label class="check">
          <input type="checkbox" id="d-full" /> AI full access (run commands, not just edit)
        </label>
        <label>Category
          <input id="d-category" type="text" placeholder="e.g. Flagship & platform" />
        </label>
        <p class="hint">Blank fields fall back to auto-detected values.</p>
      </div>
      <div class="drawer-foot">
        <button class="btn" id="d-cancel">Cancel</button>
        <button class="btn btn-primary" id="d-save">Save</button>
      </div>
    </aside>

    <!-- workspace / cockpit -->
    <div class="ws-backdrop" id="ws-backdrop" hidden></div>
    <section class="workspace" id="workspace" hidden>
      <header class="ws-head">
        <div class="ws-title">
          <span class="ws-name" id="ws-name">—</span>
          <span class="ws-status" id="ws-status">idle</span>
        </div>
        <button class="icon-btn" id="ws-close" aria-label="Close workspace">✕</button>
      </header>
      <div class="ws-runbar" id="ws-runbar">
        <input id="ws-cmd" type="text" spellcheck="false" placeholder="run command…" />
        <button class="btn btn-primary" id="ws-run">▶ Run</button>
        <button class="btn" id="ws-stop">■ Stop</button>
        <button class="btn" id="ws-clear" title="Clear the console">Clear</button>
      </div>
      <div class="ws-tabs" id="ws-tabs">
        <button class="ws-tab on" data-pane="logs">Logs</button>
        <button class="ws-tab" data-pane="web">Web</button>
        <button class="ws-tab" data-pane="ai">AI</button>
        <button class="ws-tab" data-pane="deploy">Deploy</button>
      </div>
      <div class="ws-panes">
        <div class="ws-console" id="ws-console" data-pane="logs"></div>
        <div class="ws-ai" data-pane="ai" hidden>
          <div class="ws-aibar">
            <select id="ws-engine" title="Which AI engine to use">
              <option value="claude">Claude Code</option>
              <option value="codex">Codex</option>
            </select>
            <label class="ws-full" title="Let the AI run shell commands, not just edit files">
              <input type="checkbox" id="ws-full" /> Full access
            </label>
            <span class="ws-ai-status" id="ws-ai-status"></span>
          </div>
          <div class="ai-limit" id="ws-ai-limit" hidden></div>
          <div class="ai-recap" id="ws-ai-recap" hidden></div>
          <div class="ws-transcript" id="ws-transcript"></div>
          <div class="ai-activity" id="ws-ai-activity" hidden>
            <span class="spinner"></span><span id="ws-ai-activity-text">Thinking…</span>
          </div>
          <div class="ws-composer">
            <textarea id="ws-msg" rows="2" placeholder="Ask the project's AI to make a change…  (Enter to send, Shift+Enter for newline)"></textarea>
            <button class="btn btn-primary" id="ws-send">Send</button>
            <button class="btn" id="ws-cancel" hidden>Stop</button>
          </div>
        </div>
        <div class="ws-web" id="ws-web" data-pane="web" hidden>
          <div class="ws-webbar">
            <span class="ws-url" id="ws-url">—</span>
            <button class="btn" id="ws-reload" title="Reload the preview">↻</button>
            <button class="btn" id="ws-openext" title="Open in a new tab">Open&nbsp;↗</button>
          </div>
          <div class="ws-webframe" id="ws-webframe"></div>
        </div>
        <div class="ws-deploy" data-pane="deploy" hidden>
          <div class="ws-deploybar">
            <div class="ws-targets" id="ws-targets">
              <button class="ws-target on" data-target="staging">Staging</button>
              <button class="ws-target" data-target="production">Production</button>
            </div>
            <code class="ws-depcmd" id="ws-depcmd">—</code>
            <span class="ws-dep-status" id="ws-dep-status"></span>
            <button class="btn" id="ws-dep-ai" title="Ask the AI to walk you through deploying">Guide me with AI</button>
            <button class="btn" id="ws-dep-stop" hidden>■ Stop</button>
            <button class="btn btn-primary" id="ws-dep-run">Deploy</button>
          </div>
          <div class="ws-console" id="ws-depconsole"></div>
        </div>
      </div>
    </section>

    <!-- shared modal backdrop -->
    <div class="modal-backdrop" id="modal-backdrop" hidden></div>

    <!-- new project -->
    <div class="modal" id="new-modal" hidden>
      <div class="modal-head">
        <h2>New project</h2>
        <button class="icon-btn" id="new-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <label>Name
          <input id="new-name" type="text" placeholder="my-project" spellcheck="false" />
        </label>
        <label>Description
          <textarea id="new-desc" rows="2" placeholder="One line on what it is (optional)"></textarea>
        </label>
        <label class="check"><input type="checkbox" id="new-git" checked /> Initialize a git repo</label>
        <label class="check"><input type="checkbox" id="new-rules" checked /> Add the house rules as CLAUDE.md</label>
        <p class="hint">Creates a folder in the workspace, alongside the other projects.</p>
      </div>
      <div class="modal-foot">
        <button class="btn" id="new-cancel">Cancel</button>
        <button class="btn btn-primary" id="new-create">Create &amp; open</button>
      </div>
    </div>

    <!-- house rules editor -->
    <div class="modal modal-wide" id="rules-modal" hidden>
      <div class="modal-head">
        <h2>House rules</h2>
        <button class="icon-btn" id="rules-close" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <p class="hint">Appended to every project's AI system prompt (and dropped into new projects as CLAUDE.md). Markdown.</p>
        <textarea id="rules-text" class="rules-text" spellcheck="false"></textarea>
      </div>
      <div class="modal-foot">
        <button class="btn" id="rules-cancel">Cancel</button>
        <button class="btn btn-primary" id="rules-save">Save</button>
      </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
